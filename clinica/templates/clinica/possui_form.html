{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Posse</title>
    <link rel="stylesheet" href="{% static 'clinica/style.css' %}">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <h1>Salvar Registro de Posse</h1>
            
            <form method="POST" class="form-ambulatorio">
                {% csrf_token %}
                
                <div class="form-content">
                    {{ form.as_p }}
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-success">Salvar</button>
                    <a href="{% url 'possui_list' %}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
