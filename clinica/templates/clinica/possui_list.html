{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Possuídos</title>
    <link rel="stylesheet" href="{% static 'clinica/style.css' %}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Registros de Posse</h1>
            <a href="{% url 'possui_create' %}" class="btn btn-primary">+ Adicionar Novo Registro</a>
        </div>

        <div class="list-container">
            {% if possui %}
                <ul class="ambulatorio-list">
                {% for item in possui %}
                    <li class="ambulatorio-item">
                        <div class="ambulatorio-info">
                            <span class="ambulatorio-id">ID: {{ item.id }}</span>
                            <span class="ambulatorio-nome">Paciente: {{ item.paciente }}</span>
                        </div>
                        <div class="ambulatorio-actions">
                            <a href="{% url 'possui_update' item.id %}" class="btn btn-edit">Editar</a>
                            <a href="{% url 'possui_delete' item.id %}" class="btn btn-delete">Deletar</a>
                        </div>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <div class="empty-message">
                    <p>Nenhum registro cadastrado no momento.</p>
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
